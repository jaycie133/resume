<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楊凱茜 Jaycie | 個人履歷設計</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-pink: #F8C8DC;     /* 柔霧粉 */
            --accent-yellow: #FEF5D7;    /* 亮奶油黃 */
            --dark-grey: #5D5D5D;        /* 深暖灰文字 */
            --soft-yellow: #FFFBEB;      /* 極淺黃背景 */
            --white: #ffffff;
            --pink-darker: #EAB8CC;      /* 深一點的粉用於強調 */
        }
/* --- 音樂播放器高級感設計：粉藍配色 --- */

.apple-music-player {
    background: #ffffff;
    width: 300px;
    padding: 25px;
    border-radius: 35px;
    box-shadow: 15px 15px 30px #d1d9e6, -15px -15px 30px #ffffff; /* 立體浮雕感 */
    text-align: center;
    margin: 30px auto;
    font-family: 'PingFang TC', sans-serif;
    border: 1px solid rgba(255, 255, 255, 0.3);
}

.player-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #a3b1c6;
    font-size: 12px;
    letter-spacing: 1.5px;
    margin-bottom: 20px;
}

.album-cover {
    width: 200px;
    height: 200px;
    border-radius: 50%; /* 圓形封面 */
    object-fit: cover;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(163, 177, 198, 0.4);
    border: 4px solid #ffffff;
}

.song-info h3 { margin: 0; font-size: 20px; color: #444; }
.song-info p { margin: 5px 0 20px; font-size: 13px; color: #a3b1c6; }

.progress-area {
    height: 6px;
    background: #e0e5ec;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 25px;
    box-shadow: inset 2px 2px 5px #b8bcc4, inset -2px -2px 5px #ffffff;
}

.progress-bar {
    height: 100%;
    width: 0%;
    /* 粉色到淺藍的漸層設計 */
    background: linear-gradient(90deg, #ffb6c1 0%, #b3e5fc 100%);
    border-radius: 10px;
    position: relative;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 25px;
    align-items: center;
}

.control-btn {
    background: #ffffff;
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    color: #a3b1c6;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 5px 5px 10px #d1d9e6, -5px -5px 10px #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.control-btn:hover {
    color: #ffb6c1; /* 懸停變粉色 */
    transform: scale(1.05);
}

.play-pause {
    font-size: 20px;
    color: #87cefa; /* 淺藍色播放鈕 */
}
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FFF9FB;  /* 極淺粉白背景 */
            color: var(--dark-grey);
            line-height: 1.7;
            padding: 40px 20px;
        }

        .resume-card {
            max-width: 950px;
            margin: 0 auto;
            background: var(--white);
            display: flex;
            box-shadow: 0 20px 40px rgba(248, 200, 220, 0.3); /* 粉色系陰影 */
            border-radius: 15px;
            overflow: hidden;
        }

        /* --- 左側側邊欄 (粉色系) --- */
        .sidebar {
            width: 38%;
            background-color: var(--primary-pink);
            color: var(--dark-grey);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-frame {
            width: 170px;
            height: 170px;
            border: 3px solid var(--white);
            padding: 5px;
            border-radius: 50%;
            margin-bottom: 30px;
            background: var(--accent-yellow);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .brand-name {
            font-size: 2.4rem;
            letter-spacing: 4px;
            margin-bottom: 8px;
            font-weight: 700;
            color: #4A4A4A;
        }

        /* ✨ 亮黃色學號標籤 */
        .id-badge {
            background-color: var(--accent-yellow);
            color: #856404; /* 深褐色文字配黃底 */
            font-weight: 700;
            padding: 5px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(254, 245, 215, 0.8);
        }

        .brand-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .info-list { width: 100%; }
        .info-item {
            font-size: 0.9rem;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.3);
            padding: 10px;
            border-radius: 8px;
        }
        .info-item i { width: 30px; color: #D896A3; font-size: 1.1rem; }
        .info-item a { color: inherit; text-decoration: none; }

        /* --- 右側內容區 --- */
        .main-content {
            width: 62%;
            padding: 60px 50px;
        }

        section { margin-bottom: 50px; }

        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            color: var(--pink-darker);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            font-weight: 700;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 3px;
            background: var(--accent-yellow);
            margin-left: 15px;
            border-radius: 10px;
        }

        .intro-text {
            font-size: 1rem;
            color: var(--dark-grey);
            border-left: 5px solid var(--primary-pink);
            padding: 5px 0 5px 20px;
            margin-bottom: 40px;
            background-color: #FFFDFE;
        }

        .content-block { margin-bottom: 30px; }
        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }
        .block-header h3 { font-size: 1.2rem; color: #4A4A4A; font-weight: 700; }
        .date { font-size: 0.85rem; color: #A0A0A0; font-weight: 500; }
        
        .sub-title { 
            font-size: 0.95rem; 
            color: #D896A3; 
            font-weight: 700; 
            margin-bottom: 10px;
            background: var(--soft-yellow);
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .list-details {
            list-style: none;
            font-size: 0.95rem;
            color: var(--dark-grey);
        }
        .list-details li { margin-bottom: 6px; position: relative; padding-left: 20px; }
        .list-details li::before {
            content: "♥";
            position: absolute;
            left: 0;
            color: var(--primary-pink);
            font-size: 0.8rem;
            top: 2px;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .skill-box h4 {
            font-size: 0.9rem;
            color: var(--pink-darker);
            margin-bottom: 12px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent-yellow);
            padding-bottom: 5px;
        }
        .skill-tag {
            display: inline-block;
            background: #FFF5F8;
            padding: 5px 12px;
            font-size: 0.85rem;
            border-radius: 50px;
            margin-right: 6px;
            margin-bottom: 8px;
            color: #D896A3;
            border: 1px solid var(--primary-pink);
        }

        .btn-group { display: flex; gap: 20px; margin-top: 30px; }
        .btn {
            flex: 1;
            padding: 14px;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 50px;
            transition: all 0.3s;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .btn-dark { background: var(--primary-pink); color: white; box-shadow: 0 4px 15px rgba(248, 200, 220, 0.4); }
        .btn-outline { border: 2px solid var(--primary-pink); color: var(--primary-pink); }
        .btn:hover { transform: scale(1.03); filter: brightness(1.05); }

        @media (max-width: 850px) {
            .resume-card { flex-direction: column; }
            .sidebar, .main-content { width: 100%; padding: 40px; }
        }
        /* --- 高級感音樂專區重新設計 --- */
.mega-music-section {
    width: 100%;
    padding: 60px 0;
    background: linear-gradient(180deg, #ffffff 0%, #FFF5D7 100%); /* 融入妳原本的柔黃色 */
    margin-top: 50px;
    display: flex;
    justify-content: center;
}

.music-container {
    position: relative;
    width: 90%;
    max-width: 850px;
    background: #ffffff;
    padding: 40px;
    border-radius: 50px;
    display: flex;
    align-items: center;
    gap: 40px;
    /* 這裡就是高級感的來源：柔和的立體陰影 */
    box-shadow: 20px 20px 60px #d9d9d9, -20px -20px 60px #ffffff;
}

.mega-album-cover {
    width: 220px;
    height: 220px;
    border-radius: 50%; /* 圓形封面 */
    object-fit: cover;
    border: 6px solid #ffffff;
    box-shadow: 0 10px 30px rgba(163, 177, 198, 0.5);
    z-index: 2;
}

.music-content { flex: 1; }

.player-header {
    color: #a3b1c6;
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

.song-details h2 { font-size: 32px; margin: 0; color: #333; }
.song-details p { font-size: 15px; color: #888; margin: 5px 0 30px; }

/* 進度條區域 */
.mega-progress-container {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 30px;
    color: #a3b1c6;
    font-size: 12px;
}

.progress-area {
    flex: 1;
    height: 8px;
    background: #e0e5ec;
    border-radius: 10px;
    box-shadow: inset 2px 2px 5px #b8bcc4, inset -2px -2px 5px #ffffff;
}

.progress-bar {
    height: 100%;
    width: 0%;
    /* 這裡使用妳最愛的粉藍漸層 */
    background: linear-gradient(90deg, var(--primary-pink) 0%, #B3E5FC 100%);
    border-radius: 10px;
}

/* 控制按鈕 */
.mega-controls { display: flex; gap: 25px; align-items: center; }

.mega-btn {
    background: #ffffff;
    border: none;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    color: #a3b1c6;
    cursor: pointer;
    box-shadow: 6px 6px 12px #d1d9e6, -6px -6px 12px #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}

.mega-btn:hover { color: var(--primary-pink); transform: translateY(-3px); }

.play-pause-btn {
    width: 65px;
    height: 65px;
    color: #87CEFA; /* 淺藍色播放鈕 */
    font-size: 20px;
}
/* --- 手機版適應補丁 (RWD) --- */
@media (max-width: 768px) {
    .music-container {
        flex-direction: column; /* 讓內容從橫的變成直的 */
        padding: 30px 20px;
        width: 95%; /* 讓它寬一點比較大氣 */
        gap: 20px;
        text-align: center; /* 文字置中 */
    }

    .mega-album-cover {
        width: 180px; /* 手機上圖片小一點 */
        height: 180px;
        margin: 0 auto;
    }

    .vinyl-record {
        display: none; /* 手機版隱藏黑膠唱片裝飾，避免擋到字 */
    }

    .song-details h2 {
        font-size: 24px; /* 標題縮小一點點 */
    }

    .mega-controls {
        justify-content: center; /* 按鈕置中 */
        width: 100%;
    }

    .bg-text {
        font-size: 60px; /* 背景裝飾文字縮小 */
        bottom: 5px;
        right: 10px;
    }
}
    </style>
</head>
<body>
<section class="mega-music-section">
        <div class="music-container">
            
            <div class="album-art-wrapper">
                <img src="https://images.unsplash.com/photo-1506157786151-b8491531f063?w=500" alt="Sweet Cover" class="mega-album-cover" id="album-cover">
                <div class="vinyl-record"></div> </div>

            <div class="music-content">
                <div class="player-header">
                    <i class="fas fa-headphones-alt"></i> <span>Jaycie's Pick</span>
                </div>
                
                <div class="song-details">
                    <h2 id="song-title">Sweet</h2>
                    <p id="song-artist">楊凱茜's Playlist</p>
                </div>

                <audio id="main-audio" src="music/sweet.mp3"></audio>

                <div class="mega-progress-container">
                    <span class="current-time">0:00</span>
                    <div class="progress-area">
                        <div class="progress-bar"></div>
                    </div>
                    <span class="max-duration">0:00</span>
                </div>

                <div class="mega-controls">
                    <button id="prev-btn" class="mega-btn"><i class="fas fa-backward"></i></button>
                    <button id="play-pause-btn" class="mega-btn play-pause-btn"><i class="fas fa-play"></i></button>
                    <button id="next-btn" class="mega-btn"><i class="fas fa-forward"></i></button>
                </div>
            </div>
            
            <div class="bg-text">MUSIC</div>
        </div>
    </section>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<!-- 1. 讓按鈕動起來的腳本 -->
    <script>
        const audio = document.querySelector("#main-audio");
        const playPauseBtn = document.querySelector("#play-pause-btn");
        const progressBar = document.querySelector(".progress-bar");

        if (playPauseBtn) {
            playPauseBtn.onclick = () => {
                if (audio.paused) {
                    audio.play();
                    playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                } else {
                    audio.pause();
                    playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
                }
            };

            audio.ontimeupdate = (e) => {
                const { currentTime, duration } = e.target;
                if (duration) {
                    progressBar.style.width = `${(currentTime / duration) * 100}%`;
                }
            };
        }
    </script>

    <!-- 2. 補回妳消失的網頁結尾標籤 -->
</body>
</html>
